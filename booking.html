<!DOCTYPE html>
<html>
<head>
<title>Book Courier</title>

<style>
body {
    font-family: Arial;
    background: #f1f1f1;
    text-align: center;
    padding: 30px;
}

form {
    background: white;
    padding: 20px;
    width: 300px;
    margin: auto;
    border-radius: 10px;
}

input, textarea {
    width: 90%;
    padding: 10px;
    margin: 8px;
}

button {
    padding: 10px 20px;
    background: orange;
    color: white;
    border: none;
}
</style>
</head>

<body>

<h2>Book Your Courier</h2>

<form onsubmit="submitForm(event)">
    <input type="text" placeholder="Sender Name" required><br>
    <input type="text" placeholder="Receiver Name" required><br>
    <input type="text" placeholder="Pickup Address" required><br>
    <input type="text" placeholder="Delivery Address" required><br>
    <input type="number" placeholder="Mobile Number" required><br>
    <textarea placeholder="Parcel Details"></textarea><br>
    
    <button type="submit">Submit Booking</button>
</form>

<p id="msg"></p>

<script>
function submitForm(e){
    e.preventDefault();
    document.getElementById("msg").innerHTML = "✅ Booking Submitted Successfully!";
}
</script>

</body>
</html>
