<!DOCTYPE html>
<html>
<head>
<title>Track Parcel</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>Track Your Parcel</h2>

<input type="text" id="track" placeholder="Enter Tracking ID">
<br><br>
<button onclick="check()">Track</button>

<p id="result"></p>

<script>
function check(){
    var id = document.getElementById("track").value;

    if(id == "12345"){
        document.getElementById("result").innerHTML = "📦 Out for Delivery";
    } else {
        document.getElementById("result").innerHTML = "❌ Invalid ID";
    }
}
</script>

</body>
</html>
